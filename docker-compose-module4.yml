version: '3.8'

networks:
  kafka-net:
    driver: bridge
    name: kafka-cluster-network

services:
  kafka-practicum-yandex-module4:
    build:
      context: .
      dockerfile: Dockerfile.module4
    platform: linux/arm64
    networks:
      - kafka-net
    environment:
      BOOTSTRAP_SERVERS: kafka1:19092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "9193:9193"
