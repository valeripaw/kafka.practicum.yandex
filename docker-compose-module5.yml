version: '3.8'

networks:
  kafka-net:
    driver: bridge
    name: kafka-cluster-network

services:
  kafka-practicum-yandex-module5:
    build:
      context: .
      dockerfile: Dockerfile.module5
    platform: linux/arm64
    networks:
      - kafka-net
    environment:
      BOOTSTRAP_SERVERS: kafka1:19092,kafka2:19093,kafka3:19094
    ports:
      - "9193:9193"
